name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (macOS 14)
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build -v

      - name: Test (with coverage)
        run: swift test -v --enable-code-coverage

      - name: Locate coverage data
        id: cov
        run: |
          PROF=$(find .build -name 'default.profdata' | head -n1)
          BIN=$(find .build -name 'ClipHistPackageTests.xctest' -print -quit)
          if [[ -n "$BIN" && -d "$BIN" ]]; then
            BIN_EXEC="$BIN/Contents/MacOS/ClipHistPackageTests"
          else
            BIN_EXEC=$(find .build -name 'ClipHistPackageTests' -type f | head -n1)
          fi
          echo "profdata=$PROF" >> "$GITHUB_OUTPUT"
          echo "binary=$BIN_EXEC" >> "$GITHUB_OUTPUT"

      - name: Emit coverage report
        if: steps.cov.outputs.profdata != '' && steps.cov.outputs.binary != ''
        run: |
          xcrun llvm-cov report \
            "${{ steps.cov.outputs.binary }}" \
            -instr-profile "${{ steps.cov.outputs.profdata }}" \
            -ignore-filename-regex='Tests/' \
            | tee coverage.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.txt
          if-no-files-found: ignore

  build-app:
    name: Build .app and .dmg
    runs-on: macos-14
    needs: test
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Pillow (for icon + DMG background)
        run: python3 -m pip install --quiet --break-system-packages Pillow

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build universal .app
        run: bash scripts/build-app.sh --arch universal

      - name: Verify binary
        run: |
          file build/ClipHist.app/Contents/MacOS/ClipHist
          lipo -info build/ClipHist.app/Contents/MacOS/ClipHist
          ls -la build/ClipHist.app/Contents/Resources/

      - name: Zip .app
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent ClipHist.app ClipHist.app.zip

      - name: Build DMG installer
        run: bash scripts/package-dmg.sh

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipHist-app-${{ github.sha }}
          path: build/ClipHist.app.zip
          retention-days: 30

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipHist-dmg-${{ github.sha }}
          path: build/ClipHist.dmg
          retention-days: 30
