name: CI

# Test job runs on pushes to main and PRs. Outside-collaborator PRs are gated
# by GitHub's "Require approval for all outside collaborators" Actions policy,
# so untrusted PRs do NOT execute CI until the repo owner clicks "Approve and run".
#
# The .app + .dmg build job is intentionally NOT triggered by `pull_request` or
# `push` — it only runs on tag push (`v*`) or manual `workflow_dispatch` by the
# owner. This means feature branches and PRs can never spend runner minutes on
# the heavy universal-build/codesign/DMG pipeline without explicit approval.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only token. Each job opts in to additional scopes if needed.
permissions:
  contents: read

jobs:
  test:
    name: Build & Test (macOS 14)
    runs-on: macos-14
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build -v

      - name: Test (with coverage)
        run: swift test -v --enable-code-coverage

      - name: Locate coverage data
        id: cov
        run: |
          PROF=$(find .build -name 'default.profdata' | head -n1)
          BIN=$(find .build -name 'ClipHistPackageTests.xctest' -print -quit)
          if [[ -n "$BIN" && -d "$BIN" ]]; then
            BIN_EXEC="$BIN/Contents/MacOS/ClipHistPackageTests"
          else
            BIN_EXEC=$(find .build -name 'ClipHistPackageTests' -type f | head -n1)
          fi
          echo "profdata=$PROF" >> "$GITHUB_OUTPUT"
          echo "binary=$BIN_EXEC" >> "$GITHUB_OUTPUT"

      - name: Emit coverage report
        if: steps.cov.outputs.profdata != '' && steps.cov.outputs.binary != ''
        run: |
          xcrun llvm-cov report \
            "${{ steps.cov.outputs.binary }}" \
            -instr-profile "${{ steps.cov.outputs.profdata }}" \
            -ignore-filename-regex='Tests/' \
            | tee coverage.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: coverage-report
          path: coverage.txt
          if-no-files-found: ignore
