name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Pillow
        run: python3 -m pip install --quiet --break-system-packages Pillow

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Test
        run: swift test -v

      - name: Build universal .app
        run: bash scripts/build-app.sh --arch universal

      - name: Package zip
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent ClipHist.app ClipHist.app.zip

      - name: Package DMG
        run: bash scripts/package-dmg.sh

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ClipHist ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/ClipHist.app.zip
            build/ClipHist.dmg
