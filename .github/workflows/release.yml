name: Release

# Triggered when a `v*` tag is pushed. Tag push is restricted by ruleset so
# only the repo owner can create release tags. This workflow re-runs the full
# build (so the artifacts attached to the Release exactly match what's in the
# tagged source) and creates the GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 30
    permissions:
      contents: write  # required to create the Release & upload assets
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Pillow
        run: python3 -m pip install --quiet --break-system-packages Pillow

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Test
        run: swift test -v

      - name: Build universal .app
        run: bash scripts/build-app.sh --arch universal

      - name: Package zip
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent ClipHist.app ClipHist.app.zip

      - name: Package DMG
        run: bash scripts/package-dmg.sh

      - name: Compute checksums
        run: |
          cd build
          shasum -a 256 ClipHist.app.zip ClipHist.dmg | tee SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ClipHist ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/ClipHist.app.zip
            build/ClipHist.dmg
            build/SHA256SUMS.txt
