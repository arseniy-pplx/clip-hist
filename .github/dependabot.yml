version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Europe/Belgrade
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: swift
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Europe/Belgrade
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - swift
    commit-message:
      prefix: deps
      include: scope
