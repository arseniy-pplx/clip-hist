name: Bug report
description: Report a problem with ClipHist
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much detail as you can.
        For security-sensitive reports, use the [private vulnerability advisory](https://github.com/arseniy-pplx/clip-hist/security/advisories/new) instead.
  - type: input
    id: version
    attributes:
      label: ClipHist version
      description: Found in the menu-bar icon → right-click → About, or `CFBundleShortVersionString` in Info.plist.
      placeholder: e.g. 0.2.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. macOS 14.5 Sonoma (Apple Silicon)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / console output
      description: |
        Optional. Output of `log show --predicate 'process == "ClipHist"' --last 5m` is especially useful.
      render: shell
  - type: checkboxes
    id: accessibility
    attributes:
      label: Permissions
      options:
        - label: ClipHist has Accessibility permission granted in System Settings
        - label: I have restarted ClipHist after granting permission
